name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Start backend
        run: node server/index.js &

      - name: Wait for backend
        run: |
          for i in {1..20}; do
            curl -sSf http://localhost:4000/api/cocktails && break || sleep 1
          done

      - name: Run smoke tests
        run: npm run test:ci
